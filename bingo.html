<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match the Breach — OWASP Bingo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { min-height: 100vh; background: #0F172A; font-family: 'Segoe UI', system-ui, sans-serif; }
@keyframes popIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
@keyframes confettiFall { 0% { transform: translateY(-10px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
.bingo-cell { transition: all 0.2s; cursor: pointer; user-select: none; -webkit-user-select: none; }
.bingo-cell:hover { transform: scale(1.03); }
.bingo-cell:active { transform: scale(0.97); }
.cat-btn { transition: all 0.15s; cursor: pointer; }
.cat-btn:hover { transform: translateY(-1px); filter: brightness(1.15); }
.cat-btn:active { transform: scale(0.96); }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const { useState, useCallback, useMemo } = React;
const e = React.createElement;

const allScenarios = [
  { text: "Employee views another team's salary data by editing the URL", category: "A01", short: "A01: Broken Access Control" },
  { text: "Regular user discovers they can access the admin dashboard", category: "A01", short: "A01: Broken Access Control" },
  { text: "API returns data for all users, not just the one logged in", category: "A01", short: "A01: Broken Access Control" },
  { text: "Deleted user's session token still works for 24 hours", category: "A01", short: "A01: Broken Access Control" },
  { text: "Cloud storage bucket left open to the public internet", category: "A02", short: "A02: Security Misconfiguration" },
  { text: "Production server still running with default admin/admin login", category: "A02", short: "A02: Security Misconfiguration" },
  { text: "Detailed error pages showing server version to visitors", category: "A02", short: "A02: Security Misconfiguration" },
  { text: "Unused API endpoints left active after a feature was removed", category: "A02", short: "A02: Security Misconfiguration" },
  { text: "Popular npm package hijacked after maintainer's account was phished", category: "A03", short: "A03: Supply Chain Failures" },
  { text: "Build pipeline pulls dependencies without verifying checksums", category: "A03", short: "A03: Supply Chain Failures" },
  { text: "Typosquatting attack: dev installs 'lodassh' instead of 'lodash'", category: "A03", short: "A03: Supply Chain Failures" },
  { text: "Open-source library quietly adds telemetry that sends data to unknown servers", category: "A03", short: "A03: Supply Chain Failures" },
  { text: "Customer passwords stored using MD5 \u2014 cracked in minutes", category: "A04", short: "A04: Cryptographic Failures" },
  { text: "Internal API sends credit card numbers over plain HTTP", category: "A04", short: "A04: Cryptographic Failures" },
  { text: "Encryption key hardcoded in the source code repository", category: "A04", short: "A04: Cryptographic Failures" },
  { text: "Backup database dump stored unencrypted on a shared drive", category: "A04", short: "A04: Cryptographic Failures" },
  { text: "Search bar input causes database to return all customer records", category: "A05", short: "A05: Injection" },
  { text: "Comment field used to steal session cookies from other users", category: "A05", short: "A05: Injection" },
  { text: "File upload name containing '../' overwrites server config", category: "A05", short: "A05: Injection" },
  { text: "User profile 'about me' field executes script when viewed by others", category: "A05", short: "A05: Injection" },
  { text: "Password reset lets you answer security questions for any account", category: "A06", short: "A06: Insecure Design" },
  { text: "No rate limit on coupon codes \u2014 bots try millions per second", category: "A06", short: "A06: Insecure Design" },
  { text: "Chatbot reveals confidential pricing when asked the right way", category: "A06", short: "A06: Insecure Design" },
  { text: "Booking system has no limit \u2014 one user reserves all available slots", category: "A06", short: "A06: Insecure Design" },
  { text: "Login page allows unlimited password attempts with no lockout", category: "A07", short: "A07: Authentication Failures" },
  { text: "Session cookie doesn't expire even after weeks of inactivity", category: "A07", short: "A07: Authentication Failures" },
  { text: "Password policy accepts '123456' as a valid password", category: "A07", short: "A07: Authentication Failures" },
  { text: "No multi-factor authentication on the finance admin portal", category: "A07", short: "A07: Authentication Failures" },
  { text: "App auto-updates without verifying the update's digital signature", category: "A08", short: "A08: Integrity Failures" },
  { text: "CI/CD pipeline has no code review step before deploying to production", category: "A08", short: "A08: Integrity Failures" },
  { text: "Deserializing user-supplied data crashes the server", category: "A08", short: "A08: Integrity Failures" },
  { text: "Config pulled from remote server at startup without integrity check", category: "A08", short: "A08: Integrity Failures" },
  { text: "50 failed admin logins in one hour \u2014 nobody was notified", category: "A09", short: "A09: Logging Failures" },
  { text: "Breach discovered 8 months later because access logs weren't kept", category: "A09", short: "A09: Logging Failures" },
  { text: "Logs stored only on the compromised server \u2014 attacker deleted them", category: "A09", short: "A09: Logging Failures" },
  { text: "Sensitive data appearing in application log files", category: "A09", short: "A09: Logging Failures" },
  { text: "Payment timeout shows full stack trace with database credentials", category: "A10", short: "A10: Mishandling Exceptions" },
  { text: "Error in auth check silently grants access instead of denying it", category: "A10", short: "A10: Mishandling Exceptions" },
  { text: "Unhandled null crashes the checkout \u2014 users lose their cart", category: "A10", short: "A10: Mishandling Exceptions" },
  { text: "API returns 200 OK with error details when it should return 403", category: "A10", short: "A10: Mishandling Exceptions" }
];

const categories = [
  { id: "A01", label: "A01: Broken Access Control", color: "#EF4444" },
  { id: "A02", label: "A02: Security Misconfiguration", color: "#F97316" },
  { id: "A03", label: "A03: Supply Chain Failures", color: "#F59E0B" },
  { id: "A04", label: "A04: Cryptographic Failures", color: "#EAB308" },
  { id: "A05", label: "A05: Injection", color: "#84CC16" },
  { id: "A06", label: "A06: Insecure Design", color: "#22C55E" },
  { id: "A07", label: "A07: Authentication Failures", color: "#14B8A6" },
  { id: "A08", label: "A08: Integrity Failures", color: "#06B6D4" },
  { id: "A09", label: "A09: Logging Failures", color: "#3B82F6" },
  { id: "A10", label: "A10: Mishandling Exceptions", color: "#8B5CF6" }
];

const catColorMap = Object.fromEntries(categories.map(function(c){return[c.id,c.color]}));

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function generateBoard() {
  var byCat = {};
  allScenarios.forEach(function(s) {
    if (!byCat[s.category]) byCat[s.category] = [];
    byCat[s.category].push(s);
  });
  var pool = [];
  Object.values(byCat).forEach(function(arr) {
    var shuffled = shuffle(arr);
    pool.push(shuffled[0]);
  });
  pool = shuffle(pool);
  return pool.slice(0, 9);
}

function BingoGame() {
  var boardState = useState(function(){return generateBoard()});
  var board = boardState[0], setBoard = boardState[1];
  var marksState = useState({});
  var marks = marksState[0], setMarks = marksState[1];
  var selectingState = useState(null);
  var selecting = selectingState[0], setSelecting = selectingState[1];
  var revealedState = useState({});
  var revealed = revealedState[0], setRevealed = revealedState[1];
  var checkedState = useState(false);
  var checked = checkedState[0], setChecked = checkedState[1];
  var confettiState = useState(false);
  var showConfetti = confettiState[0], setShowConfetti = confettiState[1];
  var viewState = useState("board");
  var view = viewState[0], setView = viewState[1];

  var handleCellClick = useCallback(function(idx) {
    if (checked) return;
    if (marks[idx] && selecting === null) {
      setMarks(function(m) { var n = Object.assign({}, m); delete n[idx]; return n; });
      return;
    }
    setSelecting(idx);
  }, [checked, marks, selecting]);

  var assignCategory = useCallback(function(catId) {
    if (selecting === null) return;
    setMarks(function(m) { var n = Object.assign({}, m); n[selecting] = catId; return n; });
    setSelecting(null);
  }, [selecting]);

  function checkAnswers() {
    var rev = {};
    board.forEach(function(s, i) {
      if (marks[i]) rev[i] = marks[i] === s.category;
    });
    setRevealed(rev);
    setChecked(true);
    var correct = Object.values(rev).filter(Boolean).length;
    if (correct >= 7) setShowConfetti(true);
  }

  function newGame() {
    setBoard(generateBoard());
    setMarks({});
    setSelecting(null);
    setRevealed({});
    setChecked(false);
    setShowConfetti(false);
  }

  var markedCount = Object.keys(marks).length;
  var correctCount = checked ? Object.values(revealed).filter(Boolean).length : 0;
  var totalMarked = checked ? Object.keys(revealed).length : 0;

  var hasBingo = useMemo(function() {
    if (!checked) return false;
    var correctSet = new Set();
    Object.entries(revealed).forEach(function(entry) { if (entry[1]) correctSet.add(Number(entry[0])); });
    for (var r = 0; r < 3; r++) { if ([0,1,2].every(function(c){return correctSet.has(r*3+c)})) return true; }
    for (var c = 0; c < 3; c++) { if ([0,1,2].every(function(r){return correctSet.has(r*3+c)})) return true; }
    if ([0,4,8].every(function(i){return correctSet.has(i)})) return true;
    if ([2,4,6].every(function(i){return correctSet.has(i)})) return true;
    return false;
  }, [checked, revealed]);

  var confettiParticles = useMemo(function() {
    return Array.from({length:40}, function(_,i) {
      return {id:i, left:Math.random()*100, delay:Math.random()*0.6, duration:1.2+Math.random(), color:categories[Math.floor(Math.random()*10)].color, size:4+Math.random()*6};
    });
  }, []);

  var children = [];

  if (showConfetti) {
    children.push(e("div", {key:"confetti", style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:100,overflow:"hidden"}},
      confettiParticles.map(function(p) {
        return e("div", {key:p.id, style:{position:"absolute",top:-10,left:p.left+"%",width:p.size,height:p.size*1.4,borderRadius:2,background:p.color,opacity:0,animation:"confettiFall "+p.duration+"s ease-in "+p.delay+"s forwards"}});
      })
    ));
  }

  // Header
  var headerChildren = [];
  headerChildren.push(e("div", {key:"title"}, 
    e("h1", {style:{color:"#F1F5F9",fontSize:20,fontWeight:800,margin:0,letterSpacing:-0.5}}, "\uD83C\uDFAF Match the Breach"),
    e("p", {style:{color:"#64748B",fontSize:12,margin:"2px 0 0"}}, "Tap a square \u2192 pick its OWASP category")
  ));
  headerChildren.push(e("div", {key:"buttons", style:{display:"flex",gap:6}},
    e("button", {onClick:function(){setView(function(v){return v==="board"?"legend":"board"})}, style:{background:"#1E293B",border:"1px solid #334155",borderRadius:8,padding:"6px 12px",color:"#94A3B8",fontSize:12,fontWeight:600,cursor:"pointer"}}, view==="board"?"\uD83D\uDCCB Legend":"\uD83C\uDFAF Board"),
    e("button", {onClick:newGame, style:{background:"#1E293B",border:"1px solid #334155",borderRadius:8,padding:"6px 12px",color:"#94A3B8",fontSize:12,fontWeight:600,cursor:"pointer"}}, "\uD83D\uDD04 New")
  ));

  children.push(e("div", {key:"header", style:{padding:"16px 20px 0",maxWidth:600,margin:"0 auto"}},
    e("div", {style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}, headerChildren),
    e("div", {style:{display:"flex",gap:12,marginTop:10,marginBottom:12}},
      e("div", {style:{background:"#1E293B",borderRadius:8,padding:"6px 12px",flex:1,textAlign:"center"}},
        e("span", {style:{color:"#64748B",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}, "Marked"),
        e("div", {style:{color:"#F1F5F9",fontSize:18,fontWeight:800}}, markedCount+"/9")
      ),
      checked ? e("div", {style:{background:"#1E293B",borderRadius:8,padding:"6px 12px",flex:1,textAlign:"center"}},
        e("span", {style:{color:"#64748B",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}, "Correct"),
        e("div", {style:{color:"#4ADE80",fontSize:18,fontWeight:800}}, correctCount+"/"+totalMarked)
      ) : null,
      checked ? e("div", {style:{background:"#1E293B",borderRadius:8,padding:"6px 12px",flex:1,textAlign:"center"}},
        e("span", {style:{color:"#64748B",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}, "Bingo?"),
        e("div", {style:{fontSize:18,fontWeight:800,color:hasBingo?"#4ADE80":"#EF4444"}}, hasBingo?"YES! \uD83C\uDF89":"Not yet")
      ) : null
    )
  ));

  if (view === "legend") {
    children.push(e("div", {key:"legend", style:{maxWidth:600,margin:"0 auto",padding:"0 20px 24px"}},
      e("div", {style:{background:"#1E293B",borderRadius:14,padding:18}},
        e("p", {style:{color:"#94A3B8",fontSize:13,fontWeight:600,margin:"0 0 12px"}}, "OWASP Top 10:2025 Categories"),
        categories.map(function(c) {
          return e("div", {key:c.id, style:{display:"flex",alignItems:"center",gap:10,marginBottom:8}},
            e("div", {style:{width:14,height:14,borderRadius:3,background:c.color,flexShrink:0}}),
            e("span", {style:{color:"#CBD5E1",fontSize:13}}, c.label)
          );
        })
      )
    ));
  } else {
    var boardChildren = [];

    if (selecting !== null) {
      boardChildren.push(e("div", {key:"selector", style:{background:"#1E293B",borderRadius:14,padding:14,marginBottom:12,border:"2px solid #3B82F6",animation:"popIn 0.2s ease"}},
        e("p", {style:{color:"#94A3B8",fontSize:12,fontWeight:600,margin:"0 0 8px"}}, "Which category? ", e("span",{style:{color:"#64748B",fontWeight:400}},"(tap to assign)")),
        e("div", {style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}},
          categories.map(function(c) {
            return e("button", {key:c.id, className:"cat-btn", onClick:function(){assignCategory(c.id)}, style:{background:c.color+"22",border:"1.5px solid "+c.color+"66",borderRadius:8,padding:"8px 10px",color:c.color,fontSize:11,fontWeight:700,textAlign:"left"}}, c.label);
          })
        ),
        e("button", {onClick:function(){setSelecting(null)}, style:{marginTop:8,background:"none",border:"none",color:"#64748B",fontSize:12,cursor:"pointer",padding:"4px 0"}}, "\u2715 Cancel")
      ));
    }

    boardChildren.push(e("div", {key:"grid", style:{display:"grid",gridTemplateColumns:"repeat(3, 1fr)",gap:6}},
      board.map(function(scenario, idx) {
        var mark = marks[idx];
        var isRevealed = checked && revealed[idx] !== undefined;
        var isCorrect = revealed[idx] === true;
        var isWrong = revealed[idx] === false;
        var isSelecting = selecting === idx;
        var markColor = mark ? catColorMap[mark] : null;
        var bg = "#1E293B", border = "2px solid #334155";
        if (isSelecting) { border = "2px solid #3B82F6"; bg = "#1E3A5F"; }
        else if (isCorrect) { bg = "#052e16"; border = "2px solid #22C55E"; }
        else if (isWrong) { bg = "#2a0a0a"; border = "2px solid #EF4444"; }
        else if (mark) { bg = markColor+"18"; border = "2px solid "+markColor+"88"; }

        var cellChildren = [];
        cellChildren.push(e("p", {key:"text", style:{color:mark?"#E2E8F0":"#94A3B8",fontSize:11,lineHeight:"1.45",margin:0,fontWeight:mark?500:400}}, scenario.text));
        var tagContent = null;
        if (mark && !checked) tagContent = e("span", {style:{fontSize:9,fontWeight:700,color:markColor,background:markColor+"22",padding:"2px 6px",borderRadius:4}}, mark);
        if (isCorrect) tagContent = e("span", {style:{fontSize:9,fontWeight:700,color:"#4ADE80",background:"#22C55E22",padding:"2px 6px",borderRadius:4}}, "\u2713 "+scenario.short);
        if (isWrong) tagContent = e("div", null,
          e("span", {style:{fontSize:9,fontWeight:700,color:"#FCA5A5",background:"#EF444422",padding:"2px 6px",borderRadius:4,display:"inline-block",marginBottom:2}}, "\u2717 You: "+mark),
          e("br"), e("span", {style:{fontSize:9,fontWeight:700,color:"#4ADE80",background:"#22C55E22",padding:"2px 6px",borderRadius:4}}, "\u2192 "+scenario.short)
        );
        cellChildren.push(e("div", {key:"tag", style:{marginTop:6}}, tagContent));
        if (mark && !checked) cellChildren.push(e("div", {key:"corner", style:{position:"absolute",top:0,right:0,width:0,height:0,borderTop:"18px solid "+markColor,borderLeft:"18px solid transparent"}}));

        return e("div", {key:idx, className:"bingo-cell", onClick:function(){handleCellClick(idx)}, style:{background:bg,border:border,borderRadius:10,padding:10,minHeight:100,display:"flex",flexDirection:"column",justifyContent:"space-between",position:"relative",overflow:"hidden"}}, cellChildren);
      })
    ));

    if (!checked && markedCount > 0) {
      boardChildren.push(e("button", {key:"check", onClick:checkAnswers, style:{width:"100%",marginTop:14,padding:"14px",background:markedCount===9?"#3B82F6":"#1E293B",border:markedCount===9?"none":"2px solid #334155",borderRadius:12,color:markedCount===9?"#fff":"#94A3B8",fontSize:15,fontWeight:700,cursor:"pointer",animation:markedCount===9?"pulse 1.5s infinite":"none",transition:"all 0.3s"}}, markedCount===9?"\uD83D\uDD0D Check My Answers!":"Check Answers ("+markedCount+"/9 marked)"));
    }

    if (checked && hasBingo) {
      boardChildren.push(e("div", {key:"result", style:{marginTop:14,background:"#052e16",border:"2px solid #22C55E",borderRadius:12,padding:16,textAlign:"center",animation:"popIn 0.3s ease"}},
        e("div", {style:{fontSize:28,marginBottom:4}}, "\uD83C\uDF89"),
        e("p", {style:{color:"#4ADE80",fontSize:16,fontWeight:800,margin:"0 0 4px"}}, "BINGO!"),
        e("p", {style:{color:"#86EFAC",fontSize:13,margin:0}}, "You got a complete line of correct answers! "+correctCount+"/"+totalMarked+" total correct.")
      ));
    }
    if (checked && !hasBingo) {
      boardChildren.push(e("div", {key:"result", style:{marginTop:14,background:"#1E293B",border:"2px solid #334155",borderRadius:12,padding:16,textAlign:"center",animation:"popIn 0.3s ease"}},
        e("p", {style:{color:"#F1F5F9",fontSize:15,fontWeight:700,margin:"0 0 4px"}}, correctCount+"/"+totalMarked+" correct \u2014 "+(correctCount>=8?"Great job!":correctCount>=6?"Nice effort!":"Keep learning!")),
        e("p", {style:{color:"#64748B",fontSize:12,margin:0}}, correctCount<totalMarked?"Review the red squares to see the correct categories.":"Almost perfect \u2014 try for a bingo line next time!")
      ));
    }

    children.push(e("div", {key:"board", style:{maxWidth:600,margin:"0 auto",padding:"0 20px 24px"}}, boardChildren));
  }

  return e("div", {style:{minHeight:"100vh",background:"#0F172A",fontFamily:"'Segoe UI', system-ui, sans-serif"}}, children);
}

ReactDOM.createRoot(document.getElementById("app")).render(e(BingoGame));
</script>
</body>
</html>
