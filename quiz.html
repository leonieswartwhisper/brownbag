<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OWASP Top 10 Quiz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { min-height: 100vh; background: #0F172A; font-family: 'Segoe UI', system-ui, sans-serif; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(4px)} }
@keyframes popIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
.quiz-option { transition: all 0.2s; border: none; }
.quiz-option:not(.answered):hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
var h = React.createElement;
var useState = React.useState, useCallback = React.useCallback, useEffect = React.useEffect;

var questions = [
  { scenario:"A customer support agent discovers they can view any customer's account by changing the ID number in the URL from /customer/101 to /customer/999.", question:"Which OWASP category does this fall under?", options:["Injection","Broken Access Control","Security Misconfiguration","Insecure Design"], correct:1, explanation:"This is Broken Access Control (A01). The system fails to verify that the logged-in user is authorized to view the requested account.", category:"A01" },
  { scenario:"Your company's staging environment is accidentally left with debug mode enabled and default admin credentials (admin/admin). A competitor finds it via Google.", question:"What vulnerability is this?", options:["Cryptographic Failures","Authentication Failures","Security Misconfiguration","Software Supply Chain Failures"], correct:2, explanation:"This is Security Misconfiguration (A02). Default credentials, debug mode in non-dev environments, and unnecessary exposure are classic misconfigurations.", category:"A02" },
  { scenario:"A widely-used open-source library your app depends on gets hijacked \u2014 the maintainer's account was compromised, and malicious code was pushed to the latest version.", question:"Which 2025 category covers this?", options:["Software Supply Chain Failures","Software & Data Integrity Failures","Injection","Insecure Design"], correct:0, explanation:"This is Software Supply Chain Failures (A03) \u2014 new in 2025! It covers compromised dependencies, malicious packages, and tampered build processes.", category:"A03" },
  { scenario:"A data breach reveals that your company stored customer passwords using MD5 hashing \u2014 an algorithm broken since 2004. Millions of passwords are cracked within hours.", question:"What category is this?", options:["Broken Access Control","Authentication Failures","Cryptographic Failures","Mishandling Exceptions"], correct:2, explanation:"This is Cryptographic Failures (A04). Using weak or outdated algorithms like MD5 for sensitive data is a textbook crypto failure.", category:"A04" },
  { scenario:"An attacker types ' OR '1'='1 into a login form's username field and gains access to the first admin account in the database.", question:"This classic attack is an example of\u2026", options:["Broken Access Control","Injection","Authentication Failures","Insecure Design"], correct:1, explanation:"This is Injection (A05) \u2014 specifically SQL injection. The app concatenates user input directly into a database query.", category:"A05" },
  { scenario:"A ticket booking system has no rate limiting. Scalper bots buy all concert tickets within seconds of release, leaving real fans empty-handed.", question:"What fundamental problem does this represent?", options:["Security Misconfiguration","Broken Access Control","Insecure Design","Authentication Failures"], correct:2, explanation:"This is Insecure Design (A06). The system was never designed to handle abuse scenarios.", category:"A06" },
  { scenario:"A corporate portal has no account lockout after failed login attempts. An attacker uses a script to try 10,000 common passwords against the CEO's account.", question:"Which vulnerability enables this attack?", options:["Injection","Cryptographic Failures","Authentication Failures","Broken Access Control"], correct:2, explanation:"This is Authentication Failures (A07). Missing brute-force protection and no MFA are key weaknesses.", category:"A07" },
  { scenario:"Your app auto-updates its dependencies every night without verifying package signatures. One night, a compromised package pushes a backdoor into production.", question:"This is an example of\u2026", options:["Software Supply Chain Failures","Software & Data Integrity Failures","Security Misconfiguration","Insecure Design"], correct:1, explanation:"This is Software & Data Integrity Failures (A08). The system doesn't verify the integrity of updates before applying them.", category:"A08" },
  { scenario:"Attackers had been exfiltrating customer data for 6 months before anyone noticed, because failed access attempts weren't logged and no alerting was configured.", question:"What failure allowed this to go undetected?", options:["Broken Access Control","Security Logging & Alerting Failures","Insecure Design","Security Misconfiguration"], correct:1, explanation:"This is Security Logging & Alerting Failures (A09). Without proper logging, breaches go undetected \u2014 the average is 200+ days!", category:"A09" },
  { scenario:"When a payment gateway times out, the application crashes and displays a full stack trace \u2014 including the database connection string with credentials \u2014 to the user.", question:"Which new 2025 category does this highlight?", options:["Cryptographic Failures","Mishandling of Exceptional Conditions","Security Misconfiguration","Insecure Design"], correct:1, explanation:"This is Mishandling of Exceptional Conditions (A10) \u2014 new in 2025! Poor error handling can leak sensitive info or put systems in insecure states.", category:"A10" }
];

var categoryColors = { A01:"#EF4444",A02:"#F97316",A03:"#F59E0B",A04:"#EAB308",A05:"#84CC16",A06:"#22C55E",A07:"#14B8A6",A08:"#06B6D4",A09:"#3B82F6",A10:"#8B5CF6" };

function Quiz() {
  var cs = useState(0), current = cs[0], setCurrent = cs[1];
  var ss = useState(null), selected = ss[0], setSelected = ss[1];
  var as = useState(false), answered = as[0], setAnswered = as[1];
  var sc = useState(0), score = sc[0], setScore = sc[1];
  var fs = useState(false), finished = fs[0], setFinished = fs[1];
  var ans = useState([]), answers = ans[0], setAnswers = ans[1];
  var sw = useState(false), shakeWrong = sw[0], setShakeWrong = sw[1];

  var q = questions[current];

  var handleSelect = useCallback(function(idx) {
    if (answered) return;
    setSelected(idx);
    setAnswered(true);
    var isCorrect = idx === q.correct;
    if (isCorrect) setScore(function(s){return s+1});
    else setShakeWrong(true);
    setAnswers(function(a){return a.concat([{questionIdx:current,selected:idx,correct:q.correct,isCorrect:isCorrect}])});
  }, [answered, q, current]);

  useEffect(function() {
    if (shakeWrong) { var t = setTimeout(function(){setShakeWrong(false)}, 500); return function(){clearTimeout(t)}; }
  }, [shakeWrong]);

  function next() {
    if (current < questions.length - 1) { setCurrent(function(c){return c+1}); setSelected(null); setAnswered(false); }
    else setFinished(true);
  }
  function restart() { setCurrent(0); setSelected(null); setAnswered(false); setScore(0); setFinished(false); setAnswers([]); }

  var pct = Math.round((score / questions.length) * 100);

  if (finished) {
    var grade = pct>=90?{emoji:"\uD83C\uDFC6",label:"Security Champion!",color:"#22C55E"}:pct>=70?{emoji:"\uD83D\uDEE1\uFE0F",label:"Well Defended!",color:"#3B82F6"}:pct>=50?{emoji:"\uD83D\uDCAA",label:"Getting Stronger!",color:"#F59E0B"}:{emoji:"\uD83D\uDCDA",label:"Keep Learning!",color:"#EF4444"};
    var missed = answers.filter(function(a){return !a.isCorrect});
    return h("div",{style:{minHeight:"100vh",background:"#0F172A",fontFamily:"'Segoe UI',system-ui,sans-serif",display:"flex",alignItems:"center",justifyContent:"center",padding:24}},
      h("div",{style:{maxWidth:540,width:"100%",textAlign:"center"}},
        h("div",{style:{fontSize:72,marginBottom:8}},grade.emoji),
        h("h1",{style:{color:"#F1F5F9",fontSize:32,margin:"0 0 4px",fontWeight:700}},grade.label),
        h("p",{style:{color:"#94A3B8",fontSize:16,margin:"0 0 24px"}},"You scored "+score+" out of "+questions.length+" ("+pct+"%)"),
        h("div",{style:{background:"#1E293B",borderRadius:16,padding:24,marginBottom:24}},
          h("div",{style:{display:"flex",justifyContent:"center",gap:8,flexWrap:"wrap",marginBottom:20}},
            answers.map(function(a,i){return h("div",{key:i,style:{width:36,height:36,borderRadius:"50%",background:a.isCorrect?"#22C55E":"#EF4444",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14,fontWeight:700}},i+1)})
          ),
          missed.length>0?h("div",{style:{textAlign:"left"}},
            h("p",{style:{color:"#94A3B8",fontSize:13,marginBottom:12,fontWeight:600}},"Review missed questions:"),
            missed.map(function(a,i){var quest=questions[a.questionIdx];return h("div",{key:i,style:{background:"#0F172A",borderRadius:10,padding:14,marginBottom:10,borderLeft:"3px solid "+categoryColors[quest.category]}},
              h("p",{style:{color:"#CBD5E1",fontSize:13,margin:"0 0 6px"}},"Q"+(a.questionIdx+1)+": "+quest.question),
              h("p",{style:{color:"#EF4444",fontSize:12,margin:"0 0 2px"}},"Your answer: "+quest.options[a.selected]),
              h("p",{style:{color:"#22C55E",fontSize:12,margin:0}},"Correct: "+quest.options[a.correct])
            )})
          ):null
        ),
        h("button",{onClick:restart,style:{background:"#3B82F6",color:"#fff",border:"none",borderRadius:12,padding:"14px 40px",fontSize:16,fontWeight:600,cursor:"pointer"}},"Try Again")
      )
    );
  }

  var catColor = categoryColors[q.category];
  return h("div",{style:{minHeight:"100vh",background:"#0F172A",fontFamily:"'Segoe UI',system-ui,sans-serif",display:"flex",flexDirection:"column"}},
    h("div",{style:{padding:"16px 24px 0"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
        h("span",{style:{color:"#94A3B8",fontSize:13,fontWeight:600}},"Question "+(current+1)+" of "+questions.length),
        h("span",{style:{color:"#94A3B8",fontSize:13}},"Score: ",h("span",{style:{color:"#22C55E",fontWeight:700}},score))
      ),
      h("div",{style:{height:4,background:"#1E293B",borderRadius:4,overflow:"hidden"}},
        h("div",{style:{height:"100%",width:((current+(answered?1:0))/questions.length*100)+"%",background:"linear-gradient(90deg,#3B82F6,"+catColor+")",borderRadius:4,transition:"width 0.5s ease"}})
      )
    ),
    h("div",{style:{flex:1,display:"flex",flexDirection:"column",padding:"20px 24px 24px",maxWidth:680,width:"100%",margin:"0 auto"}},
      h("div",{style:{background:"#1E293B",borderRadius:16,padding:24,marginBottom:20,borderLeft:"4px solid "+catColor,animation:"popIn 0.3s ease"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:10}},
          h("span",{style:{background:catColor,color:"#fff",fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,letterSpacing:0.5}},q.category),
          h("span",{style:{color:"#64748B",fontSize:12}},"Scenario")
        ),
        h("p",{style:{color:"#E2E8F0",fontSize:15,lineHeight:1.6,margin:0}},q.scenario)
      ),
      h("p",{style:{color:"#F1F5F9",fontSize:17,fontWeight:600,marginBottom:14}},q.question),
      h("div",{style:{display:"flex",flexDirection:"column",gap:10,animation:shakeWrong?"shake 0.4s ease":"none"}},
        q.options.map(function(opt,i){
          var isCorrect=i===q.correct, isSelected=i===selected;
          var bg="#1E293B",border="2px solid #334155",textColor="#CBD5E1";
          if(answered){if(isCorrect){bg="rgba(34,197,94,0.15)";border="2px solid #22C55E";textColor="#4ADE80"}else if(isSelected){bg="rgba(239,68,68,0.15)";border="2px solid #EF4444";textColor="#FCA5A5"}else{textColor="#475569"}}
          return h("button",{key:i,className:"quiz-option"+(answered?" answered":""),onClick:function(){handleSelect(i)},disabled:answered,style:{background:bg,border:border,borderRadius:12,padding:"14px 18px",color:textColor,fontSize:15,fontWeight:500,textAlign:"left",cursor:answered?"default":"pointer",display:"flex",alignItems:"center",gap:12}},
            h("span",{style:{width:28,height:28,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:answered&&isCorrect?"#22C55E":answered&&isSelected?"#EF4444":"#334155",color:"#fff",fontSize:13,fontWeight:700}},answered&&isCorrect?"\u2713":answered&&isSelected?"\u2717":String.fromCharCode(65+i)),
            opt
          );
        })
      ),
      answered?h("div",{style:{background:selected===q.correct?"rgba(34,197,94,0.1)":"rgba(239,68,68,0.1)",borderRadius:12,padding:18,marginTop:16,borderLeft:"4px solid "+(selected===q.correct?"#22C55E":"#EF4444"),animation:"popIn 0.3s ease"}},
        h("p",{style:{color:selected===q.correct?"#4ADE80":"#FCA5A5",fontWeight:700,fontSize:14,margin:"0 0 6px"}},selected===q.correct?"Correct!":"Not quite!"),
        h("p",{style:{color:"#94A3B8",fontSize:13,lineHeight:1.6,margin:0}},q.explanation)
      ):null,
      answered?h("div",{style:{display:"flex",justifyContent:"flex-end",marginTop:16}},
        h("button",{onClick:next,style:{background:"#3B82F6",color:"#fff",border:"none",borderRadius:10,padding:"12px 32px",fontSize:15,fontWeight:600,cursor:"pointer",animation:"popIn 0.3s ease"}},current<questions.length-1?"Next Question \u2192":"See Results \uD83C\uDFAF")
      ):null
    )
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(h(Quiz));
</script>
</body>
</html>
