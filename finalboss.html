<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Boss — Tiebreaker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { min-height: 100vh; background: #0F172A; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; padding: 24px; }
@keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 70% { box-shadow: 0 0 0 15px rgba(239,68,68,0); } }
.boss-input {
  width: 100%; padding: 16px 20px; font-size: 20px; font-weight: 600;
  background: #1E293B; border: 2px solid #334155; border-radius: 12px;
  color: #F1F5F9; outline: none; text-align: center;
  font-family: 'Segoe UI', system-ui, sans-serif; transition: border-color 0.2s;
}
.boss-input:focus { border-color: #EF4444; }
.boss-input::placeholder { color: #475569; font-weight: 400; }
.boss-btn {
  width: 100%; padding: 16px; font-size: 17px; font-weight: 700;
  border: none; border-radius: 12px; cursor: pointer;
  font-family: 'Segoe UI', system-ui, sans-serif;
  transition: transform 0.15s, filter 0.2s;
}
.boss-btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
.boss-btn:active { transform: scale(0.98); }
.boss-btn:disabled { opacity: 0.4; cursor: default; transform: none; filter: none; }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
var h = React.createElement;
var useState = React.useState, useRef = React.useRef;

function FinalBoss() {
  var stepState = useState("name");
  var step = stepState[0], setStep = stepState[1];
  var nameState = useState("");
  var name = nameState[0], setName = nameState[1];
  var answerState = useState("");
  var answer = answerState[0], setAnswer = answerState[1];
  var tsState = useState(null);
  var timestamp = tsState[0], setTimestamp = tsState[1];
  var inputRef = useRef(null);

  function submitName() {
    if (name.trim().length === 0) return;
    setStep("answer");
    setTimeout(function(){ if(inputRef.current) inputRef.current.focus(); }, 100);
  }
  function submitAnswer() {
    if (answer.trim().length === 0) return;
    setTimestamp(new Date());
    setStep("result");
  }
  function handleKey(e, action) { if (e.key === "Enter") action(); }
  function restart() { setStep("name"); setName(""); setAnswer(""); setTimestamp(null); }

  function formatTime(d) {
    var pad2 = function(n){return n.toString().padStart(2,"0")};
    var pad3 = function(n){return n.toString().padStart(3,"0")};
    return pad2(d.getHours())+":"+pad2(d.getMinutes())+":"+pad2(d.getSeconds())+"."+pad3(d.getMilliseconds());
  }

  var content;

  if (step === "name") {
    content = h("div",{style:{animation:"popIn 0.3s ease",textAlign:"center"}},
      h("div",{style:{fontSize:48,marginBottom:8}},"\u2694\uFE0F"),
      h("h1",{style:{color:"#EF4444",fontSize:28,fontWeight:800,margin:"0 0 4px",letterSpacing:-0.5}},"FINAL BOSS"),
      h("p",{style:{color:"#64748B",fontSize:14,margin:"0 0 32px"}},"Tiebreaker Round"),
      h("p",{style:{color:"#94A3B8",fontSize:15,marginBottom:12,fontWeight:500}},"Enter your name to begin"),
      h("input",{className:"boss-input",type:"text",placeholder:"Your name",value:name,onChange:function(ev){setName(ev.target.value)},onKeyDown:function(ev){handleKey(ev,submitName)},autoFocus:true}),
      h("div",{style:{height:16}}),
      h("button",{className:"boss-btn",style:{background:"#EF4444",color:"#fff"},onClick:submitName,disabled:name.trim().length===0},"Ready \u2192")
    );
  }

  if (step === "answer") {
    content = h("div",{style:{animation:"popIn 0.3s ease",textAlign:"center"}},
      h("div",{style:{background:"#1E293B",borderRadius:16,padding:24,marginBottom:24,borderLeft:"4px solid #EF4444"}},
        h("p",{style:{color:"#64748B",fontSize:12,fontWeight:600,margin:"0 0 8px",textTransform:"uppercase",letterSpacing:0.5}},"\u2694\uFE0F Final Boss"),
        h("p",{style:{color:"#F1F5F9",fontSize:20,fontWeight:700,margin:0,lineHeight:1.4}},"The question is on screen. Type your answer below!")
      ),
      h("p",{style:{color:"#94A3B8",fontSize:14,marginBottom:12}},h("span",{style:{color:"#F1F5F9",fontWeight:600}},name),", enter your answer:"),
      h("input",{ref:inputRef,className:"boss-input",type:"text",placeholder:"Your answer",value:answer,onChange:function(ev){setAnswer(ev.target.value)},onKeyDown:function(ev){handleKey(ev,submitAnswer)}}),
      h("p",{style:{color:"#475569",fontSize:11,margin:"8px 0 16px",fontStyle:"italic"}},"No going back once you submit!"),
      h("button",{className:"boss-btn",style:{background:"#EF4444",color:"#fff",animation:answer.trim()?"pulse 2s infinite":"none"},onClick:submitAnswer,disabled:answer.trim().length===0},"\uD83C\uDFC6 Submit Answer")
    );
  }

  if (step === "result") {
    content = h("div",{style:{animation:"popIn 0.3s ease",textAlign:"center"}},
      h("div",{style:{fontSize:48,marginBottom:8}},"\u2694\uFE0F"),
      h("h2",{style:{color:"#F1F5F9",fontSize:24,fontWeight:800,margin:"0 0 24px"}},"Answer Submitted!"),
      h("div",{style:{background:"#1E293B",borderRadius:16,overflow:"hidden",border:"2px solid #334155",textAlign:"left"}},
        h("div",{style:{background:"#0F172A",padding:"14px 20px",borderBottom:"1px solid #33415533"}},
          h("p",{style:{color:"#64748B",fontSize:11,margin:0,textTransform:"uppercase",letterSpacing:0.5,fontWeight:600}},"Submission Receipt")
        ),
        h("div",{style:{padding:20}},
          h("div",{style:{marginBottom:18}},
            h("p",{style:{color:"#64748B",fontSize:11,margin:"0 0 4px",textTransform:"uppercase",letterSpacing:0.5,fontWeight:600}},"Name"),
            h("p",{style:{color:"#F1F5F9",fontSize:22,margin:0,fontWeight:700}},name)
          ),
          h("div",{style:{marginBottom:18}},
            h("p",{style:{color:"#64748B",fontSize:11,margin:"0 0 4px",textTransform:"uppercase",letterSpacing:0.5,fontWeight:600}},"Submitted at"),
            h("p",{style:{color:"#F1F5F9",fontSize:22,margin:0,fontWeight:700,fontVariantNumeric:"tabular-nums"}},formatTime(timestamp))
          ),
          h("div",null,
            h("p",{style:{color:"#64748B",fontSize:11,margin:"0 0 4px",textTransform:"uppercase",letterSpacing:0.5,fontWeight:600}},"Answer"),
            h("p",{style:{color:"#F1F5F9",fontSize:22,margin:0,fontWeight:700}},answer)
          )
        )
      ),
      h("p",{style:{color:"#475569",fontSize:13,marginTop:20}},"Show this screen to the presenter to verify your submission."),
      h("button",{className:"boss-btn",style:{background:"#1E293B",color:"#94A3B8",border:"2px solid #334155",marginTop:12},onClick:restart},"Next player \u2192")
    );
  }

  return h("div",{style:{maxWidth:440,width:"100%"}},content);
}

ReactDOM.createRoot(document.getElementById("app")).render(h(FinalBoss));
</script>
</body>
</html>
